<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>archi-law-cl-03 | 건축 토픽엔진</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
<header class="topbar">
  <div class="brand">
    <div class="logo">A</div>
    <div class="brandText">
      <div class="name">archi-law-cl-03</div>
    </div>
  </div>
  <button id="btnReset" class="btn danger">초기화</button>
</header>

<main class="layout">

  <!-- 🔵 LEFT COLUMN -->
  <div class="leftColumn">

    <!-- 선택 -->
    <section class="card compact">
      <h2>선택</h2>

      <div class="row3">

        <div class="field">
          <div class="fieldLabel">시도 *</div>
          <select id="selSido" class="select"></select>
        </div>

        <div class="field">
          <div class="fieldLabel">시군구 *</div>
          <!-- ✅ select 방식으로 변경 -->
          <select id="selSigungu" class="select">
            <option value="">(시군구 선택)</option>
          </select>
        </div>

        <div class="field">
          <div class="fieldLabel">건축물 용도</div>
          <select id="selUse" class="select"></select>
        </div>

      </div>

      <div class="row">
        <div class="field">
          <div class="fieldLabel">토픽 *</div>
          <select id="selTopic" class="select"></select>
        </div>
      </div>

      <div class="row split">
        <button id="btnBuild" class="btn primary">결과 생성</button>
        <button id="btnAutoFind" class="btn">자동찾기</button>
      </div>

      <div class="row toggles">
        <label><input id="chkIncludeAct" type="checkbox" checked /> 상위법 포함</label>
        <label><input id="chkIncludeOrdin" type="checkbox" checked /> 자치법규 포함</label>
      </div>
    </section>

    <!-- 저장소 (선택창 아래로 이동) -->
    <section class="card">
      <h2>저장소</h2>

      <div class="row split">
        <input id="inpFilter" class="input" placeholder="검색…" />
        <button id="btnClearFilter" class="btn ghost">지우기</button>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="k">소스</div>
          <div class="v" id="statSources">0</div>
        </div>
        <div class="stat">
          <div class="k">토픽 태그</div>
          <div class="v" id="statTags">0</div>
        </div>
      </div>

      <div id="libList" class="libList"></div>
    </section>

  </div>

  <!-- 🔴 RIGHT COLUMN (결과 크게) -->
  <div class="rightColumn">

    <section class="card bigResult">

      <h2>결과</h2>

      <div id="ctxBar" class="ctxBar">
        <span class="badge" id="bSido">-</span>
        <span class="badge" id="bSigungu">-</span>
        <span class="badge soft" id="bUse">용도:-</span>
        <span class="badge soft" id="bTopic">토픽:-</span>
        <button id="btnCopyQuery" class="btn ghost">검색어 복사</button>
      </div>

      <!-- 상위법 -->
      <div class="panel">
        <h3>상위법(전국 공통)</h3>
        <div id="upperList" class="list"></div>
      </div>

      <!-- 자치법규 (상위법 아래로 이동) -->
      <div class="panel">
        <h3>자치법규(해당 지자체)</h3>
        <div id="ordinList" class="list"></div>
      </div>

      <!-- 자동 후보 -->
      <div class="panel">
        <h3>자동찾기 후보</h3>
        <div id="candidateBox" class="candidateBox"></div>
      </div>

    </section>

  </div>

</main>

<script type="module" src="./main.js"></script>
</body>
</html>
